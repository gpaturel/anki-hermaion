<!DOCTYPE html>
<html>

<head>
    <style>
        .card {
            font-family: "GFS Didot";
            font-size: 35px;
            text-align: center;
            color: black;
            background-color: white;
            line-height: 1.1;
        }

        .fr {
            font-size: 22px;
        }

        .quantité {
            font-size: 50%;
            color: brown;
        }

        .cas {
            font-variant: small-caps;
            background-color: lavender;
        }

        .désinence {
            font-weight: bold;
            color: blue;
        }

        td {
            font-weight: normal;
            text-align: left;
            vertical-align: top;
            padding-right: 10px;
        }

        @font-face {
            font-family: "GFS Didot";
            src: url('_GFS-Didot.ttf');
        }
    </style>
</head>

<body class="card">
    {{grec}}
    <hr />
    <span class="fr">
        {{français}}
    </span>
</body>

</html>
