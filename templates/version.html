<!DOCTYPE html>
<html>

<head>
    <style>
        .card {
            font-family: "GFS Didot";
            font-size: 22px;
            text-align: left;
            color: black;
            background-color: white;
            line-height: 1.1;
        }

        .fr {
            font-size: 80%;
            font-style: italic;
        }

        @font-face {
            font-family: "GFS Didot";
            src: url('_GFS-Didot.ttf');
        }

        .bloc,
        .sujet,
        .attribut {
            border-left: solid;
            border-right: solid;
            border-color: black;
            border-radius: 3pt;
            border-width: 2px;
            padding-left: 5px;
            padding-right: 5px;
            padding-bottom: 1px;
            padding-top: 1px;
        }

        .sujet,
        .attribut {
            font-weight: bold;
            border: solid;
            border-width: 2px;
            border-color: grey;
            background-color: beige;
        }

        .attribut {
            font-weight: normal;
            border-width: 1px;
        }

        .verbe {
            font-weight: bold;
            border-bottom: solid;
            border-width: 3px;
        }

        .COD {
            font-style: italic;
            color: darkred;
        }

        .COI {
            font-style: italic;
            color: darkslateblue;
        }

        .CCL {
            font-style: italic;
            color: darkgreen;
        }

        .CCT {
            font-style: italic;
            color: darkblue;
        }

        .CDN {
            font-size: small;
            font-weight: normal;
        }

        sub {
            font-size: 50%;
            color: grey;
        }
    </style>
</head>

<body class="card">
    {{grec (brut)}} <span style="font-size: 40%">[{{id}}]</span>
    <hr />
    <span style="font-size: 80%">
        {{grec (analyse)}}
        <br />
        <span class="fr">{{français}}</span>
    </span>
</body>

</html>
